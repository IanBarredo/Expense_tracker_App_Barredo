name: spendr
description: A simple expense tracking app built with Flutter + Provider.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2   # ChangeNotifier / Consumer / MultiProvider
  uuid: ^4.3.3        # Unique IDs for each Expense

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true